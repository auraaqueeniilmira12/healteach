<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HEALTEACH - Edit Profil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <!-- MOBILE HEADER -->
    <div class="mobile-header">
        <button class="mobile-back-btn" onclick="history.back()">
            <i class="fas fa-arrow-left"></i>
        </button>
        <div class="mobile-header-title">Edit Profil</div>
        <div class="mobile-header-placeholder"></div>
    </div>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <h1>HEALTEACH</h1>
        </div>
        
        <div class="nav-links">
            <a href="../index.html"><i class="fas fa-home"></i><span>Beranda</span></a>
            <a href="#"><i class="fas fa-book"></i><span>Konten</span></a>
            <a href="#"><i class="fas fa-calendar"></i><span>Rencana</span></a>
            <a href="#"><i class="fas fa-check-square"></i><span>Checklist</span></a>
            <a href="index.html"><i class="fas fa-user"></i><span>Profil</span></a>
        </div>
        
        <div class="nav-icons">
            <button class="search-btn"><i class="fas fa-search"></i></button>
            <button class="bell-btn"><i class="fas fa-bell"></i></button>
            <div class="avatar-placeholder" id="avatarBtn">
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT - EDIT PROFIL -->
    <main class="main-content">
        <div class="profile-container">
            <div class="profile-card">
                <div class="card-header">
                    <i class="fas fa-pen"></i>
                    <h3>Edit Data Diri</h3>
                </div>
                
                <form id="editProfileForm" class="edit-profile-form">
                    <!-- Nama Lengkap -->
                    <div class="form-group">
                        <label for="fullName">
                            <i class="fas fa-user"></i> Nama Lengkap
                        </label>
                        <input type="text" id="fullName" name="fullName" placeholder="Masukkan nama lengkap">
                    </div>

                    <!-- Email (readonly) -->
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" id="email" name="email" readonly disabled>
                        <small class="form-note">Email tidak dapat diubah</small>
                    </div>

                    <!-- Usia -->
                    <div class="form-group">
                        <label for="age">
                            <i class="fas fa-calendar"></i> Usia (tahun)
                        </label>
                        <input type="number" id="age" name="age" min="1" max="120" placeholder="Contoh: 25">
                    </div>

                    <!-- Jenis Kelamin -->
                    <div class="form-group">
                        <label for="gender">
                            <i class="fas fa-venus-mars"></i> Jenis Kelamin
                        </label>
                        <select id="gender" name="gender">
                            <option value="">Pilih Jenis Kelamin</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>

                    <!-- Berat Badan -->
                    <div class="form-row">
                        <div class="form-group half">
                            <label for="weight">
                                <i class="fas fa-weight-scale"></i> Berat Badan (kg)
                            </label>
                            <input type="number" id="weight" name="weight" step="0.1" min="20" max="300" placeholder="Contoh: 58">
                        </div>

                        <!-- Tinggi Badan -->
                        <div class="form-group half">
                            <label for="height">
                                <i class="fas fa-ruler"></i> Tinggi Badan (cm)
                            </label>
                            <input type="number" id="height" name="height" step="0.1" min="50" max="250" placeholder="Contoh: 160">
                        </div>
                    </div>

                    <!-- Tujuan Kesehatan -->
                    <div class="form-group">
                        <label for="goal">
                            <i class="fas fa-bullseye"></i> Tujuan Kesehatan
                        </label>
                        <select id="goal" name="goal">
                            <option value="">Pilih Tujuan</option>
                            <option value="Menurunkan berat badan">Menurunkan berat badan</option>
                            <option value="Meningkatkan berat badan">Meningkatkan berat badan</option>
                            <option value="Menjaga kebugaran">Menjaga kebugaran</option>
                            <option value="Membangun otot">Membangun otot</option>
                            <option value="Mengurangi stres">Mengurangi stres</option>
                            <option value="Meningkatkan stamina">Meningkatkan stamina</option>
                        </select>
                    </div>

                    <!-- Tombol Aksi -->
                    <div class="form-actions">
                        <button type="button" class="btn-cancel" onclick="history.back()">
                            <i class="fas fa-times"></i> Batal
                        </button>
                        <button type="submit" class="btn-save">
                            <i class="fas fa-save"></i> Simpan Perubahan
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="../assets/js/script.js"></script>
    <script src="profile.js"></script>
</body>
</html>
