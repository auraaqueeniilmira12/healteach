<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - HEALTEACH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/password.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            
            <!-- KIRI: FORM LUPA PASSWORD -->
            <div class="auth-left">
                <div class="auth-logo">
                    <i class="fas fa-leaf"></i>
                    <h1>HEALTEACH</h1>
                    <p>Lupa Password?</p>
                </div>
                
                <div class="info-text">
                    <i class="fas fa-shield-alt"></i>
                    <p>Masukkan email dan nama lengkap Anda untuk verifikasi.</p>
                </div>
                
                <form id="forgot-form">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="forgot-email" required placeholder="contoh@email.com">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nama Lengkap</label>
                        <input type="text" id="forgot-name" required placeholder="Nama lengkap Anda">
                    </div>
                    
                    <div class="error-message" id="forgot-error"></div>
                    
                    <button type="submit" class="btn btn-primary">VERIFIKASI & RESET</button>
                </form>
                
                <div class="auth-footer">
                    <a href="login.html"><i class="fas fa-arrow-left"></i> Kembali ke Login</a>
                </div>
            </div>

            <!-- KANAN: ILUSTRASI -->
            <div class="auth-right">
                <div class="illustration">
                    <i class="fas fa-lock"></i>
                    <h3>Verifikasi Akun</h3>
                    <p>Isi data Anda dengan benar untuk mereset password</p>
                </div>
                
                <div class="steps">
                    <div class="step-item">
                        <div class="step-number">1</div>
                        <div class="step-text">Masukkan email terdaftar</div>
                    </div>
                    <div class="step-item">
                        <div class="step-number">2</div>
                        <div class="step-text">Masukkan nama lengkap</div>
                    </div>
                    <div class="step-item">
                        <div class="step-number">3</div>
                        <div class="step-text">Buat password baru</div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script src="assets/js/login-register.js"></script>
</body>
</html>
