<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - HEALTEACH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="assets/css/password.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            
            <!-- KIRI: FORM RESET PASSWORD -->
            <div class="auth-left">
                <div class="auth-logo">
                    <i class="fas fa-leaf"></i>
                    <h1>HEALTEACH</h1>
                    <p>Buat Password Baru</p>
                </div>
                
                <div class="info-text">
                    <i class="fas fa-key"></i>
                    <p>Masukkan password baru Anda di bawah ini.</p>
                </div>
                
                <form id="reset-form">
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password Baru</label>
                        <input type="password" id="new-password" required placeholder="Minimal 6 karakter">
                    </div>
                    
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Konfirmasi Password</label>
                        <input type="password" id="confirm-password" required placeholder="Masukkan password yang sama">
                    </div>
                    
                    <div class="error-message" id="reset-error"></div>
                    <div class="success-message" id="reset-success"></div>
                    
                    <button type="submit" class="btn btn-primary">RESET PASSWORD</button>
                </form>
                
                <div class="auth-footer">
                    <a href="login.html"><i class="fas fa-arrow-left"></i> Kembali ke Login</a>
                </div>
            </div>

            <!-- KANAN: ILUSTRASI -->
            <div class="auth-right">
                <div class="illustration">
                    <i class="fas fa-shield-alt"></i>
                    <h3>Password Baru</h3>
                    <p>Buat password yang kuat dan mudah diingat</p>
                </div>
                
                <div class="tips">
                    <div class="tip-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Minimal 6 karakter</span>
                    </div>
                    <div class="tip-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Gunakan kombinasi huruf dan angka</span>
                    </div>
                    <div class="tip-item">
                        <i class="fas fa-check-circle"></i>
                        <span>Jangan gunakan password yang sama dengan akun lain</span>
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <script src="assets/js/login-register.js"></script>
</body>
</html>
